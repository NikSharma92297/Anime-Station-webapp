<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Anime Station</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="app">

  <!-- HOME (Anime Station) -->
  <section id="view-home" class="view view--active">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" id="btn-top-requested" title="Top Requested Animes">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 4.5H16V9C16 11.4853 13.9853 13.5 11.5 13.5H12.5C10.0147 13.5 8 11.4853 8 9V4.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M8 5.5H5.5C5.5 8 6.5 9.5 8 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M16 5.5H18.5C18.5 8 17.5 9.5 16 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M12 13.5V17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M9.5 17H14.5L15 19.5H9L9.5 17Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="brand">
          <span class="dot" id="status-dot"></span>
          <span class="brand-text">ANIME<span class="cursor">_</span>STATION</span>
        </div>
      </div>
      <div class="header-icons">
        <button class="icon-btn" id="btn-profile" title="Profile">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4.5 19.5C5.8 16.2 8.6 14.5 12 14.5C15.4 14.5 18.2 16.2 19.5 19.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="search-wrap">
      <input type="text" id="search-input" class="search-input" placeholder="Search anime..." autocomplete="off" />
      <span class="search-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/>
          <path d="M20 20L16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </span>
    </div>

    <p class="notice" id="global-notice"></p>

    <!-- Search results (shown instead of trending/grid while searching) -->
    <div id="search-results" class="anime-grid" style="display:none;"></div>

    <div id="available-section" style="display:none;">
      <div class="section-head">
        <span class="section-title">Available Anime</span>
      </div>
      <div class="az-index-bar" id="az-index-bar"></div>
      <div id="available-grid"></div>
    </div>

    <div id="browse-sections">
      <div class="section-head">
        <span class="section-title">Trending Now</span>
      </div>
      <div class="trending-row" id="trending-row">
        <div class="skel skel--card"></div>
        <div class="skel skel--card"></div>
        <div class="skel skel--card"></div>
      </div>

      <div class="section-head">
        <span class="section-title">Popular</span>
      </div>
      <div class="anime-grid" id="popular-grid">
        <div class="skel skel--grid-card"></div>
        <div class="skel skel--grid-card"></div>
        <div class="skel skel--grid-card"></div>
        <div class="skel skel--grid-card"></div>
      </div>

      <button class="load-more-btn" id="btn-load-more">Load more</button>
    </div>

    <nav class="bottom-nav" id="bottom-nav">
      <button class="bottom-nav-btn bottom-nav-btn--active" data-bottom-tab="all">All</button>
      <button class="bottom-nav-btn" data-bottom-tab="available">Available</button>
    </nav>
  </section>

  <!-- PROFILE -->
  <section id="view-profile" class="view">
    <header class="topbar topbar--sub">
      <button class="back" data-back>&lsaquo; back</button>
      <span class="topbar-title">Profile</span>
    </header>

    <div class="panel">
      <div class="avatar-row">
        <img id="profile-photo" class="avatar" alt="" />
        <div>
          <div class="name" id="profile-name">&mdash;</div>
          <div class="handle" id="profile-handle">&mdash;</div>
        </div>
      </div>

      <dl class="kv">
        <div class="kv-row"><dt>Telegram ID</dt><dd id="profile-id">&mdash;</dd></div>
        <div class="kv-row"><dt>Registered in bot</dt><dd id="profile-registered">&mdash;</dd></div>
        <div class="kv-row"><dt>Role</dt><dd id="profile-role">&mdash;</dd></div>
        <div class="kv-row"><dt>Access</dt><dd id="profile-banned">&mdash;</dd></div>
      </dl>
    </div>
  </section>

  <!-- TOP REQUESTED -->
  <section id="view-top-requested" class="view">
    <header class="topbar topbar--sub">
      <button class="back" data-back>&lsaquo; back</button>
      <span class="topbar-title">🏆 Top Requested</span>
    </header>

    <div id="top-requested-list" class="top-requested-list">
      <div class="skel skel--row"></div>
      <div class="skel skel--row"></div>
      <div class="skel skel--row"></div>
    </div>
  </section>

</div>

<!-- ANIME DETAILS MODAL -->
<div class="modal-overlay" id="anime-modal-overlay" style="display:none;">
  <div class="anime-modal">
    <button class="anime-modal-close" id="anime-modal-close">&#10005;</button>
    <div class="anime-modal-cover-wrap">
      <img id="anime-modal-cover" class="anime-modal-cover" alt="" />
      <div class="anime-modal-cover-fade"></div>
    </div>
    <div class="anime-modal-body">
      <h2 class="anime-modal-title" id="anime-modal-title">&mdash;</h2>
      <div class="anime-modal-genres" id="anime-modal-genres"></div>
      <p class="anime-modal-desc" id="anime-modal-desc">&mdash;</p>
      <div class="anime-action-row">
        <button class="anime-action-btn" id="anime-action-btn">Request Anime</button>
        <button class="anime-set-channel-btn" id="anime-set-channel-btn" style="display:none;" title="Set channel (admin only)">+</button>
      </div>
      <button class="anime-vote-btn" id="anime-vote-btn" style="display:none;"></button>
      <button class="report-btn" id="report-btn">🚩 Report an issue</button>
    </div>
  </div>
</div>

<!-- Report an issue -->
<div class="modal-overlay" id="report-modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title">Report an issue</div>
    <div class="report-options" id="report-options">
      <button class="report-option" data-reason="link_not_working">Link isn't working</button>
      <button class="report-option" data-reason="wrong_anime">Wrong anime uploaded</button>
      <button class="report-option" data-reason="missing_episodes">Episodes are missing</button>
      <button class="report-option" data-reason="poor_quality">Poor video quality</button>
      <button class="report-option" data-reason="wrong_channel">Wrong channel linked</button>
      <button class="report-option" data-reason="other">Other</button>
    </div>
    <input type="text" id="report-message-input" class="modal-input" placeholder="Optional details (max 50 chars)" maxlength="50" autocomplete="off" style="margin-top:10px;" />
    <div class="modal-error" id="report-error"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn--cancel" id="report-cancel">Cancel</button>
      <button class="modal-btn modal-btn--confirm" id="report-submit">Submit</button>
    </div>
  </div>
</div>

<!-- Admin-only: set/change linked channel for an anime -->
<div class="modal-overlay" id="set-channel-modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title">Set Join Link</div>
    <input type="text" id="set-channel-input" class="modal-input" placeholder="Channel ID, @username, or https:// link" autocomplete="off" autocapitalize="off" />
    <div class="modal-error" id="set-channel-error"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn--cancel" id="set-channel-cancel">Cancel</button>
      <button class="modal-btn modal-btn--confirm" id="set-channel-confirm">Save</button>
    </div>
  </div>
</div>

<!-- Admin-only: confirm removing an anime from Available -->
<div class="modal-overlay" id="delete-confirm-modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title">Remove from Available?</div>
    <p class="info-popup-text" id="delete-confirm-text"></p>
    <div class="modal-error" id="delete-confirm-error"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn--cancel" id="delete-confirm-cancel">Cancel</button>
      <button class="modal-btn modal-btn--confirm modal-btn--danger" id="delete-confirm-submit">Remove</button>
    </div>
  </div>
</div>

<!-- Simple info popup (used for Coming Soon / Not Available taps) -->
<div class="modal-overlay" id="info-popup-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title" id="info-popup-title">Notice</div>
    <p class="info-popup-text" id="info-popup-text"></p>
    <div class="modal-actions">
      <button class="modal-btn modal-btn--confirm" id="info-popup-close">OK</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
